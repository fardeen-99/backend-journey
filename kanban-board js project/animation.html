<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
     <style>
        body {
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 100%;
  overflow: hidden;
}

.track {
  display: flex;
  gap: 30px;
  animation: moveX 12s linear infinite;
  width: fit-content;
}

.box {
  min-width: 150px;
  height: 100px;
  background: #1e90ff;
  color: white;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  transition: filter 0.3s ease, transform 0.3s ease;
}

/* 🚀 Movement */
@keyframes moveX {
  from {
    transform: translateX(-100%);
  }
  to {
    transform: translateX(100%);
  }
}

/* 🛑 Pause animation on hover */
.track:hover {
  animation-play-state: paused;
}

/* 🌫 Blur all */
.track:hover .box {
  filter: blur(6px);
}

/* ✨ Active one stays clear */
.track .box:hover {
  filter: blur(0);
  transform: scale(1.25);
  border-radius: 1rem;
  z-index: 2;
}

     </style>
</head>
<body>
<div class="container">
  <div class="track">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
  </div>
</div>

</body>
</html>
